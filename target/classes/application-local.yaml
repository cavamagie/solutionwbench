spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      uri: mongodb://root:root@localhost:27017/giftcard?authSource=admin
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9080/realms/local}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    security:
      protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:giftcard-application}
      auto-offset-reset: earliest
    producer:
      topic:
        gift-card-activated: ${KAFKA_TOPIC_GIFT_CARD_ACTIVATED:gift-card-activated}
    properties:
      sasl:
        mechanism: ${KAFKA_SASL_MECHANISM:}
        jaas:
          config: ${KAFKA_SASL_JAAS_CONFIG:}
      ssl:
        endpoint:
          identification:
            algorithm: ${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:https}

giftcard:
  kafka:
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:giftcard-application}
    topics:
      gift-card-activated: ${KAFKA_TOPIC_GIFT_CARD_ACTIVATED:gift-card-activated}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    oauth:
      client-id: web_app
      scopes:
        - openid
        - profile
        - email
    try-it-out-enabled: true

# OAuth2 URLs for local Keycloak
oauth2:
  authorization-url: http://localhost:9080/realms/local/protocol/openid-connect/auth
  token-url: http://localhost:9080/realms/local/protocol/openid-connect/token
HOST: localhost

server:
  url: ${HOST}
  port: 8080
  ssl:
    enabled: false

logging.level:
  root: INFO
  org: INFO
  k5.giftcard: DEBUG
