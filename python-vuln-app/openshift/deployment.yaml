apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-vuln-app
  labels:
    app: python-vuln-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-vuln-app
  template:
    metadata:
      labels:
        app: python-vuln-app
    spec:
      containers:
      - name: python-vuln-app
        image: image-registry.openshift-image-registry.svc:5000/${NAMESPACE}/python-vuln-app:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: python-vuln-app
  labels:
    app: python-vuln-app
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: python-vuln-app
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: python-vuln-app
  labels:
    app: python-vuln-app
spec:
  to:
    kind: Service
    name: python-vuln-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

