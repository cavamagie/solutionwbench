# A Domain Service represents a service that performs domain operations that don't naturally fit within an entity or value object. Domain services contain domain logic that operates across multiple aggregates or entities. They are stateless and represent operations that are part of the domain but don't belong to a specific entity.
type: ddd.domain-service
label: Get Giftcards for Customer
summary: Domain service determines all giftcards incl. balance, id etc. for a customer.
description: >-
  #### Description


  Domain services gives the basic information of all giftcards for one customer
  back.


  ​

  ​


  #### Input


  * customerId


  ​

  ​


  #### Output​


  Array of elements with


  * giftcardId

  * balance

  * currencyCode


  ​

  ​


  #### Service logic / flow


  * Determine all gift card instances with the as input provided customerId

  * Map each found instance to the output and give all as array back (array is
  empty if no gift cards for this customer)


  ​

  ​


  #### Postcondition


  * Gift cards for customerId provided


  ​
