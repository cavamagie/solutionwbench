label: Redeem gift card at checkout
summary: |-
  operationId: RedeemGiftcard
  Redeems gift card for paying an order.
description: >-
  The *RedeemGiftcard* operation redeems an amount from the balance of an
  existing giftcard.


  ​

  ​


  #### Precondition


  * Giftcard exists


  ​​


  #### Operation logic / flow


  * Operation determines Giftcard instance; if not found the response will be
  with a 404 status code

  * Otherwise the Redeem instance command will be called after having the
  request body information mapped to the input of the command

  * When something fails, the error message will be mapped to the Error schema
  and with a 400 status code responded

  * Otherwise the information from the updated Giftcard instance will be mapped
  to the output schema, which will be responded with a 200 status code


  ​​


  #### Postcondition


  * Desired amount from Giftcard redeemed

  * Response contains the corresponding schema
