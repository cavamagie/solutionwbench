label: Get gift card payment transactions
summary: |-
  operationId: getGiftcardTransactions
  Provides the transactions for a particular gift card.
description: >-
  The *GetGiftcardTransactions* operation provides all Transactions for a
  Giftcard.


  ​

  ​


  #### Precondition


  * Giftcard exists


  ​​


  #### Operation logic / flow


  * Operation determines the Giftcard instance first; if not found the response
  will be a 404 status code (with Error schema)

  * Otherwise it retrieves the transactions from the instance and maps it to the
  Transaction schema

  * The result will be responded as array schema with a 200 status code


  ​​


  #### Postcondition


  * Transactions for Giftcard provided

  * Response contained corresponding schema
