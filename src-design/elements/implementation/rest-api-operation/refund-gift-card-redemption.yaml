label: Refund gift card redemption
summary: >-
  operationId: refundGiftcard

  Refunds (partly) before redeemed amount, e.g., when order was (partly)
  returned.
description: >-
  The *refundGiftcard* operation handles a refund of a before performed
  redemption (full or partly).


  ​

  ​


  #### Precondition


  * Gift card exists and redemption was processed before


  ​​


  #### Operation logic / flow


  * Operation determines 1st the giftcard instance and responds if not found
  with a 404 status code

  * If found it maps the information of the request body to the input of the
  Refund command and calls it

  * If something goes wrong, it maps the error message to the Error schema and
  responds with a 400 status code

  * In success case, it maps the information from the updated giftcard instance
  to the output schema and responds with a 200 status code


  ​​


  #### Postcondition


  * Gift card updated, refund processed

  * Response contains corresponding schema
