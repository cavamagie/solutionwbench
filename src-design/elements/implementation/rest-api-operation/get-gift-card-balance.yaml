label: Get gift card balance
summary: |-
  operationId: getGiftcardBalance
  Provides the balance for particular gift card.
description: >-
  The *GetGiftcardBalance* operation provides the balance for a particular
  giftcard instance.


  ​

  ​​


  #### Operation logic / flow


  * Operation determines the Giftcard instance by the as path parameter provided
  id

  * If not found, a 404 error shall be responded

  * Otherwise, the found entity instance shall get mapped to the to be reponded
  schema and answered with a 200 status code


  ​​


  #### Postcondition


  * Balance for Giftcard retrieved.
