label: Create a new gift card
summary: |+
  operationId: CreateGiftcard
  Creates a new gift card incl. balance, customer reference etc.

description: >-
  The *CreateGiftcard* operation takes care of creating a giftcard.


  #### ​&#xA;​Operation logic


  * Operation maps information of request body to input of Activate command in
  domain layer.

  * Calls the factory command.

  * In error case, the reason will be mapped to the Error schema and with a 400
  status code responded;

  * Otherwise the new created instance shall get mapped to the response schema
  and get responded with a 201 status code


  ​​


  #### Postcondition


  * Giftcard instance created

  * Operations response contains corresponding schema
