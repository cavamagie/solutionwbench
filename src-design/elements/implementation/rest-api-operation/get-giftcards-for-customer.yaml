label: Get giftcards for customer
summary: |-
  operationId: getGiftcardsForCustomer
  Provides all giftcards for a customer.
description: >-
  The *GetGiftcardsForCustomer* operation provides all Giftcards for a
  particular Customer.


  ​

  ​


  #### Precondition


  none




  ​​


  #### Operation logic / flow


  * Operation calls the corresponding domain service to determine all Giftcard
  instance for a Customer.&#x20;

  * It maps the domain services output to the as response expected output schema
  (an array of it).

  * If there is no Giftcard for that customer the array shall be empty.

  * The result will be responded as array schema with a 200 status code


  ​​


  #### Postcondition


  * Giftcards for Customer provided

  * Response contained corresponding array
