{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "application.fullname" . }}-config-reader-binding
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    {{- include "application.annotations" . | nindent 4 }}
  labels:
    {{- include "application.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "application.fullname" . }}-config-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "application.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
{{- end }}

