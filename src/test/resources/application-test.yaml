spring:
  config:
    activate:
      on-profile: test

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}
springdoc.swagger-ui.oauth.client-id: web-app

logging.level:
  root: INFO
  org.hibernate.SQL: DEBUG
  org.hibernate.type.descriptor.sql.BasicBinder: TRACE

HOST: localhost

server:
  url: ${HOST}
  port: 8080
  ssl:
    enabled: false
