apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-vuln-app
  namespace: vulnerable-app-test
  labels:
    app: java-vuln-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-vuln-app
  template:
    metadata:
      labels:
        app: java-vuln-app
    spec:
      containers:
      - name: java-vuln-app
        image: image-registry.openshift-image-registry.svc:5000/vulnerable-app-test/java-vuln-app:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: java-vuln-app
  namespace: vulnerable-app-test
  labels:
    app: java-vuln-app
spec:
  selector:
    app: java-vuln-app
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: java-vuln-app
  namespace: vulnerable-app-test
  labels:
    app: java-vuln-app
spec:
  to:
    kind: Service
    name: java-vuln-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

